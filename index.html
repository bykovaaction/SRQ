<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Читательский квест Адель</title>
  <meta name="theme-color" content="#765be0">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/shared/icon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/shared/icon.png">
  <style>
    @font-face {
      font-family: "Nunito";
      src: url("fonts/Nunito-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Nunito";
      src: url("fonts/Nunito-SemiBold.ttf") format("truetype");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Nunito";
      src: url("fonts/Nunito-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --ink: #202343;
      --muted: #69718f;
      --line: #dfe5ff;
      --paper: #f5f7ff;
      --panel: #ffffff;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --mint: #c6eeff;
      --mint-strong: #6574ed;
      --coral: #7a67e8;
      --coral-soft: #edf0ff;
      --lemon: #bfefff;
      --sky: #cfeeff;
      --blue: #547dea;
      --lilac: #e4ddff;
      --plum: #7358dd;
      --gold: #ffd76a;
      --shadow: 0 22px 48px rgba(44, 56, 130, 0.14);
      --soft-shadow: 0 12px 28px rgba(44, 56, 130, 0.10);
      --radius: 22px;
      color-scheme: light;
      font-family: "Nunito", "Trebuchet MS", "Arial Rounded MT Bold", ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, #f8fbff 0%, #eef3ff 54%, #f7f4ff 100%);
      overflow-x: hidden;
      font-weight: 500;
    }

    button, input, textarea, select {
      font: inherit;
    }

    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      width: min(430px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px 12px 96px;
    }

    .game-hero {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brand {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      min-width: 0;
      padding: 15px;
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 28px;
      color: #fff;
      background:
        linear-gradient(115deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0) 34%),
        linear-gradient(135deg, #765be0 0%, #5e82ee 56%, #63d1ef 100%);
      box-shadow: 0 22px 42px rgba(78, 95, 207, 0.26), inset 0 -1px 0 rgba(255,255,255,0.16);
      position: relative;
      overflow: hidden;
    }

    .brand::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 48%, transparent 100%);
      transform: translateX(-70%) skewX(-18deg);
      opacity: 0.52;
      pointer-events: none;
    }

    .mascot {
      width: 72px;
      height: 72px;
      justify-self: center;
      filter: drop-shadow(0 12px 14px rgba(20, 30, 83, 0.22));
      position: relative;
      z-index: 1;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.58rem;
      line-height: 1.02;
      letter-spacing: 0;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .brand p {
      margin: 6px 0 0;
      color: rgba(255,255,255,0.86);
      font-size: 0.92rem;
      font-weight: 500;
      position: relative;
      z-index: 1;
    }

    .level-card {
      display: grid;
      gap: 7px;
      padding: 12px 14px;
      border-radius: 22px;
      border: 1px solid rgba(113, 97, 224, 0.16);
      background: var(--surface-strong);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255,255,255,0.88);
    }

    .level-row {
      min-height: 52px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 54px;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .level-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .level-copy span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .level-copy strong {
      color: var(--ink);
      font-size: 1rem;
      line-height: 1.18;
      font-weight: 700;
    }

    .level-pill {
      width: 52px;
      height: 52px;
      display: block;
      justify-self: end;
      filter: drop-shadow(0 8px 9px rgba(137, 100, 28, 0.18));
    }

    .level-star {
      width: 100%;
      height: 100%;
    }

    .level-track {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: #edf1ff;
      border: 1px solid rgba(115, 88, 221, 0.10);
      box-shadow: inset 0 2px 4px rgba(41, 54, 120, 0.08);
    }

    .level-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #8168f0, #68cef0);
      transition: width 360ms ease;
    }

    .quick-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      min-height: 66px;
      display: grid;
      align-content: center;
      justify-items: center;
      padding: 10px 10px 11px;
      border: 1px solid rgba(91,139,241,0.15);
      border-radius: 22px;
      background: var(--surface-strong);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255,255,255,0.9);
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 1.32rem;
      line-height: 1.05;
      color: var(--plum);
      font-weight: 700;
    }

    .stat span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 600;
      line-height: 1.1;
      white-space: nowrap;
    }

    .coin-stack {
      width: 24px;
      height: 24px;
      display: block;
      flex: 0 0 auto;
    }

    .coin-stack.small {
      width: 20px;
      height: 20px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: start;
      width: 100%;
    }

    .screen {
      display: none;
      animation: screenIn 220ms ease;
    }

    .screen.active {
      display: grid;
      gap: 14px;
    }

    @keyframes screenIn {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .panel {
      border: 1px solid rgba(91,139,241,0.16);
      border-radius: 26px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    details.panel summary {
      list-style: none;
      cursor: pointer;
    }

    details.panel summary::-webkit-details-marker {
      display: none;
    }

    details.panel:not([open]) .panel-head {
      border-bottom: 0;
    }

    .chevron {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(115, 88, 221, 0.12);
      color: var(--muted);
      font-weight: 700;
      transition: transform 200ms ease;
    }

    details[open] .chevron {
      transform: rotate(90deg);
    }

    .panel-head {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 16px;
      border-bottom: 1px solid rgba(115, 88, 221, 0.10);
      background:
        linear-gradient(90deg, rgba(231,226,255,0.92), rgba(213,240,255,0.76)),
        rgba(255,255,255,0.72);
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      flex: 1;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.2;
      font-weight: 700;
      min-width: 0;
    }

    .icon-badge {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      background: linear-gradient(180deg, #effbff, var(--lemon));
      border: 1px solid rgba(96,112,232,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 7px 14px rgba(74, 92, 180, 0.10);
    }

    .panel-body {
      padding: 16px;
    }

    .focus-panel {
      border-color: rgba(115, 88, 221, 0.20);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(248,250,255,0.88)),
        var(--surface-strong);
    }

    .focus-panel .panel-head {
      color: #fff;
      border-bottom-color: rgba(36,48,67,0.1);
      background:
        linear-gradient(115deg, rgba(255,255,255,0.20) 0%, rgba(255,255,255,0) 35%),
        linear-gradient(90deg, var(--plum), #5a83ef 62%, #60cdea);
    }

    .focus-panel .icon-badge {
      background: var(--lemon);
      color: var(--ink);
    }

    .quest-note {
      margin: 0 0 14px;
      padding: 12px 13px;
      border: 1px solid rgba(105,80,201,0.12);
      border-radius: 18px;
      background: linear-gradient(90deg, rgba(231,226,255,0.72), rgba(228,248,255,0.62));
      color: #463a83;
      font-weight: 600;
      line-height: 1.3;
    }

    .reader-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(96px, 140px);
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
    }

    .field-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #3f347d;
    }

    .step-dot {
      position: relative;
      width: 34px;
      height: 32px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 34px;
      color: #211b43;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(255,255,255,0.42);
      padding-top: 5px;
      z-index: 0;
    }

    .step-dot::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 2px;
      width: 24px;
      height: 21px;
      border-radius: 58% 58% 50% 50%;
      background: linear-gradient(160deg, #ffe58c, #ffd05e 58%, #f6b83d);
      box-shadow: 0 8px 14px rgba(137,100,28,0.13), inset 0 1px 0 rgba(255,255,255,0.62);
      transform: translateX(-50%) rotate(-3deg);
      z-index: -1;
    }

    .step-dot::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 1px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ffd86b;
      box-shadow:
        -9px 5px 0 #ffd86b,
        9px 5px 0 #ffd86b;
      transform: translateX(-50%);
      z-index: -1;
    }

    input, textarea, select {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(115, 88, 221, 0.18);
      border-radius: 18px;
      background: rgba(255,255,255,0.92);
      color: var(--ink);
      padding: 12px 13px;
      outline: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    textarea {
      min-height: 104px;
      resize: vertical;
      line-height: 1.4;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(84,125,234,0.13);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: center;
    }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 13px;
      border-radius: 18px;
      color: #152033;
      background: var(--mint);
      font-weight: 600;
      box-shadow: 0 10px 20px rgba(74, 92, 180, 0.10), inset 0 1px 0 rgba(255,255,255,0.68);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .btn:active,
    .nav-btn:active,
    .mini:active,
    .star:active,
    .swatch:active {
      transform: scale(0.98);
    }

    .btn.primary {
      color: #fff;
      background:
        linear-gradient(115deg, rgba(255,255,255,0.20), rgba(255,255,255,0) 35%),
        linear-gradient(90deg, var(--plum), #4f7ded);
      min-height: 56px;
      width: 100%;
      font-size: 1.05rem;
      font-weight: 700;
      animation: buttonPulse 1800ms ease-in-out infinite;
    }

    @keyframes buttonPulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .btn.coral {
      color: #fff;
      background:
        linear-gradient(115deg, rgba(255,255,255,0.20), rgba(255,255,255,0) 35%),
        linear-gradient(90deg, var(--coral), #4f8df0);
    }

    .btn.ghost {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(115, 88, 221, 0.18);
      box-shadow: 0 8px 18px rgba(74, 92, 180, 0.07);
      color: var(--ink);
    }

    .notice {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 40;
      width: min(360px, calc(100% - 44px));
      padding: 18px 20px;
      border-radius: 22px;
      background: linear-gradient(90deg, rgba(237,240,255,0.96), rgba(231,247,255,0.96));
      border: 1px solid rgba(116,99,223,0.18);
      font-weight: 700;
      display: block;
      box-shadow: 0 18px 38px rgba(42,54,126,0.18), inset 0 1px 0 rgba(255,255,255,0.88);
      text-align: center;
      transform: translate(-50%, -50%) scale(0.94);
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .notice.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .notice.hide {
      opacity: 0;
      transform: translate(-50%, -50%) translateY(12px) scale(0.96);
    }

    @keyframes pop {
      from { transform: translateX(-50%) translateY(8px) scale(0.98); opacity: 0; }
      to { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
    }

    .progress-list {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .progress-row {
      display: grid;
      gap: 7px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .track {
      position: relative;
      height: 20px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf1ff;
      border: 1px solid rgba(115, 88, 221, 0.10);
      box-shadow: inset 0 2px 4px rgba(41, 54, 120, 0.08);
    }

    .fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.32), rgba(255,255,255,0) 48%),
        linear-gradient(90deg, var(--plum), #65c9f2);
      transition: width 420ms ease;
    }

    .paw-path {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      margin-top: 6px;
    }

    .paw {
      min-width: 0;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(238,242,246,0.82);
      color: #9aa7b7;
      font-size: 0.92rem;
      border: 1px solid rgba(36,48,67,0.08);
    }

    .paw.done {
      background: linear-gradient(180deg, #f2edff, var(--mint));
      color: #44349a;
      box-shadow: 0 7px 14px rgba(84,125,234,0.10);
    }

    .collection-block {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      padding: 12px;
      border-radius: 22px;
      border: 1px solid rgba(115,88,221,0.12);
      background: rgba(255,255,255,0.72);
    }

    .collection-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .collection-head h3 {
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.16;
    }

    .collection-head span {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .sticker-album {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .sticker {
      min-height: 72px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 4px;
      padding: 8px 5px;
      border-radius: 18px;
      border: 1px solid rgba(115,88,221,0.12);
      background: rgba(255,255,255,0.9);
      color: #342a74;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.82), 0 8px 16px rgba(74,92,180,0.07);
      text-align: center;
      font-weight: 700;
      font-size: 0.68rem;
      line-height: 1.08;
    }

    .sticker-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(180deg, #f8fbff, #e8ecff);
      font-size: 1.28rem;
    }

    .sticker small {
      color: var(--muted);
      font-size: 0.62rem;
      font-weight: 700;
      line-height: 1.08;
    }

    .sticker.locked {
      color: #8a93a6;
      background: rgba(246,248,251,0.86);
      filter: grayscale(0.65);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      margin-bottom: 12px;
      border-radius: 18px;
      border: 1px solid rgba(115, 88, 221, 0.12);
      background: rgba(247,249,251,0.78);
    }

    .tab {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      padding: 7px 10px;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
      line-height: 1.15;
      text-align: center;
    }

    .tab.active {
      background: rgba(255,255,255,0.94);
      color: var(--ink);
      box-shadow: 0 6px 16px rgba(74,92,180,0.10);
    }

    .book-form {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(96px, 0.42fr);
      gap: 12px;
    }

    .cover-options {
      display: grid;
      grid-template-columns: repeat(8, 34px);
      gap: 7px;
      justify-content: start;
    }

    .swatch {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 1px solid transparent;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 7px 14px rgba(74,92,180,0.08);
      position: relative;
      overflow: hidden;
    }

    .swatch.active {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(115,88,221,0.12), inset 0 1px 0 rgba(255,255,255,0.75);
    }

    .swatch.locked {
      background: #eef2f6 !important;
      color: #7b8794;
    }

    .swatch.locked::after {
      content: "";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10V8a5 5 0 0 1 10 0v2' fill='none' stroke='%237358dd' stroke-width='2.2' stroke-linecap='round'/%3E%3Crect x='5' y='10' width='14' height='10' rx='2.5' fill='%237358dd'/%3E%3Ccircle cx='12' cy='15' r='1.3' fill='white'/%3E%3C/svg%3E") center / 18px 18px no-repeat,
        rgba(255,255,255,0.5);
    }

    .rating {
      display: flex;
      gap: 4px;
      min-height: 44px;
      align-items: center;
      justify-content: flex-start;
    }

    .star {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #eef2f6;
      color: #9aa7b7;
      font-size: 1.06rem;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.82);
    }

    .star.active {
      background: linear-gradient(180deg, #fff3b0, var(--gold));
      color: #6f4f15;
      box-shadow: 0 7px 14px rgba(137, 100, 28, 0.12);
    }

    .shelf {

      align-items: stretch;

    .shelf-actions {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .book {
      min-height: 190px;
      display: grid;
      grid-template-rows: 112px auto;
      border-radius: 22px;
      border: 1px solid rgba(115, 88, 221, 0.12);
      background: rgba(255,255,255,0.92);

      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255,255,255,0.9);

      gap: 6px;

      font-size: 0.9rem;

    .book-info p {
      margin: 0;

      font-size: 0.78rem;
      line-height: 1.25;
      word-break: break-word;
    }

    .mini-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
      gap: 6px;
      margin-top: 2px;

    .mini {
      min-height: 30px;

      border: 1px solid rgba(115, 88, 221, 0.12);
      border-radius: 22px;
      background: rgba(255,255,255,0.9);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255,255,255,0.9);

    .entry-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 10px;
      font-weight: 600;

      word-break: break-word;
    }

    .entry p {
      margin: 0;
      color: var(--muted);
      line-height: 1.32;
      font-size: 0.84rem;
      word-break: break-word;

    .status {

      gap: 5px;
      padding: 5px 8px;
      border-radius: 999px;
      background: #e8ecff;
      color: var(--plum);
      font-size: 0.72rem;
      font-weight: 600;
    }

    .status.pending {
      background: #eef6ff;
      color: #4c669d;
    }

    .status.approved {
      background: #e8ecff;
      color: #543cb8;
    }

    .drawer {
      display: none;
    }

    .drawer.active {
      display: block;
    }

    .game-nav {
      position: fixed;
      left: 50%;
      bottom: 12px;
      z-index: 20;
      width: min(406px, calc(100% - 24px));
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 7px;
      border: 1px solid rgba(115, 88, 221, 0.14);
      border-radius: 26px;
      background: rgba(255,255,255,0.90);
      box-shadow: 0 18px 42px rgba(42,54,126,0.22), inset 0 1px 0 rgba(255,255,255,0.94);
      transform: translateX(-50%);
      backdrop-filter: blur(12px);

    .nav-btn {
      min-height: 58px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 2px;
      padding: 7px 2px;
      border-radius: 20px;
      color: var(--muted);
      background: transparent;
      font-size: 0.64rem;
      font-weight: 600;
    }

    .nav-btn span {
      font-size: 1.15rem;
      line-height: 1;
    }

    .nav-btn.active {
      color: #fff;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.20), rgba(255,255,255,0) 45%),
        linear-gradient(180deg, var(--plum), var(--blue));
      box-shadow: 0 9px 18px rgba(84, 125, 234, 0.22);
    }

    /* Visual refresh based on the supplied design screens. */
    :root {
      --ink: #090b27;
      --muted: #5f6380;
      --line: #ddd5ff;
      --paper: #fbfaff;
      --panel: #ffffff;
      --surface: #ffffff;
      --surface-strong: #ffffff;
      --plum: #7438f4;
      --violet: #8748ff;
      --violet-soft: #f1eaff;
      --gold: #f6a200;
      --shadow: 0 18px 38px rgba(53, 43, 120, 0.12);
      --soft-shadow: 0 10px 22px rgba(45, 38, 105, 0.10);
    }

    body {
      background:
        radial-gradient(circle at 18% 0%, rgba(238,226,255,0.9) 0, rgba(238,226,255,0) 34%),
        linear-gradient(180deg, #fffefe 0%, #fbfaff 58%, #f7f2ff 100%);
      color: var(--ink);
    }

    .app {
      width: min(470px, 100%);
      padding: 12px 10px 100px;
    }

    .brand {
      grid-template-columns: minmax(112px, 36%) minmax(0, 1fr);
      min-height: 172px;
      padding: 12px 16px;
      border: 1.5px solid #d4c3ff;
      border-radius: 24px;
      color: var(--ink);
      background:
        radial-gradient(circle at 84% 18%, rgba(255,255,255,0.96) 0 16%, rgba(255,255,255,0) 44%),
        linear-gradient(135deg, #f6efff 0%, #ffffff 54%, #f1eaff 100%);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .brand::after {
      right: -18%;
      bottom: -44%;
      inset: auto -18% -44% auto;
      width: 75%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(151,104,255,0.08);
      transform: none;
      opacity: 1;
    }

    .mascot-photo {
      width: 100%;
      max-width: 156px;
      aspect-ratio: 1;
      object-fit: contain;
      justify-self: center;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 13px 10px rgba(30, 22, 92, 0.12));
    }

    .brand > svg.mascot {
      display: none;
    }

    .brand h1 {
      font-size: clamp(2.1rem, 10vw, 3.05rem);
      line-height: 0.98;
      color: var(--ink);
    }

    .brand p {
      margin-top: 14px;
      color: #242845;
      font-size: clamp(1rem, 4.2vw, 1.35rem);
    }

    .level-card {
      grid-template-columns: 82px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 20px;
      border-color: rgba(16, 18, 46, 0.10);
      position: relative;
    }

    .level-card::before {
      content: "";
      width: 74px;
      aspect-ratio: 1;
      display: block;
      background: url("assets/mission/mission-level.png") center / contain no-repeat;
      filter: drop-shadow(0 8px 10px rgba(78, 49, 162, 0.18));
    }

    .level-row {
      display: contents;
      min-height: 76px;
    }

    .level-copy span {
      color: var(--violet);
      font-size: 1rem;
    }

    .level-copy strong {
      font-size: clamp(1.35rem, 6.5vw, 2.05rem);
      line-height: 1.08;
    }

    .level-pill {
      display: grid;
      place-items: center;
      position: absolute;
      left: 14px;
      top: 14px;
      width: 74px;
      height: 74px;
      filter: none;
      z-index: 1;
    }

    .level-star path {
      display: none;
    }

    .level-star text {
      font-size: 24px;
    }

    .level-track {
      grid-column: 2;
      height: 12px;
    }

    .level-fill {
      background: linear-gradient(90deg, #7b36f4, #9a5aff);
    }

    .quick-stats {
      gap: 8px;
    }

    .stat {
      min-height: 78px;
      grid-template-columns: 52px minmax(0, 1fr);
      align-items: center;
      justify-items: start;
      gap: 10px;
      padding: 10px 14px;
      border-color: rgba(16, 18, 46, 0.10);
      border-radius: 17px;
      text-align: left;
    }

    .stat::before {
      content: "";
      width: 62px;
      aspect-ratio: 1;
      grid-row: 1 / span 2;
      align-self: center;
      justify-self: center;
      border-radius: 0;
      background: var(--stat-icon) center / contain no-repeat;
      box-shadow: none;

    .stat.pages { --stat-icon: url("assets/mission/mission-book.png"); --stat-bg: #efe7ff; }
    .stat.books { --stat-icon: url("assets/mission/mission-.png"); --stat-bg: #ffe2a1; }
    .stat.streak { --stat-icon: url("assets/mission/mission-calendar.png"); --stat-bg: #ffd1d3; }
    .stat.coins { --stat-icon: url("assets/mission/mission-coin.png"); --stat-bg: #ffe4a3; }
    .stat .coin-stack { display: none; }

    .stat strong {
      font-size: 2rem;
      color: #000;
      align-self: end;
      line-height: 1;
    }

    .stat span {
      margin-top: -7px;

      font-size: 0.96rem;
      white-space: normal;
      align-self: start;
    }

    .panel {

      entries: [],

    let state = loadState();

    const $ = selector => document.querySelector(selector);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved) return cloneInitialState();

        return {
          ...initialState,
          ...saved,
          entries: (saved.entries || []).map(entry => ({ status: "approved", ...entry })),
          books: (saved.books || []).map(book => ({ author: "", status: "approved", ...book }))
        };
      } catch {
        return cloneInitialState();
      }
    }

    function cloneInitialState() {
      return JSON.parse(JSON.stringify(initialState));
    }

    function makeId() {
      const randomId = globalThis.crypto && typeof globalThis.crypto.randomUUID === "function";
      return randomId ? globalThis.crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function dateKey(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function today() {
      return dateKey();
    }

    function formatDate(value) {
      return new Intl.DateTimeFormat("ru-RU", { day: "numeric", month: "long" }).format(new Date(value + "T12:00:00"));
    }

    function isApproved(item) {
      return item.status !== "pending";
    }

    function approvedEntries(s = state) {
      return s.entries.filter(isApproved);
    }

    function approvedBooks(s = state) {
      return s.books.filter(isApproved);
    }

    function baseMetrics(s = state) {
      const entries = approvedEntries(s);
      const books = approvedBooks(s);
      const pages = entries.reduce((sum, entry) => sum + Number(entry.pages || 0), 0);
      return {
        pages,
        books: books.length,
        readingDays: new Set(entries.map(entry => entry.date)).size,
        pageCoins: pages,
        bookCoins: books.length * 25,
        streakCoins: streakBonusCoins(entries)
      };
    }

    function earnedRewardIds(s = state) {
      return rewards.filter(reward => reward.test(s)).map(reward => reward.id);
    }

    function syncUnlockedRewards(s = state) {
      const knownIds = new Set(rewards.map(reward => reward.id));
      const previous = (s.unlockedRewards || []).filter(id => knownIds.has(id));
      const unlockedSet = new Set([...previous, ...earnedRewardIds(s)]);
      const changed = unlockedSet.size !== (s.unlockedRewards || []).length || previous.length !== (s.unlockedRewards || []).length;
      s.unlockedRewards = [...unlockedSet];
      return changed;
    }

    function totals(s = state) {
      const metrics = baseMetrics(s);
      const knownIds = new Set(rewards.map(reward => reward.id));
      const rewardCoins = (s.unlockedRewards || []).filter(id => knownIds.has(id)).length * 5;
      return {
        ...metrics,
        rewardCoins,
        coins: metrics.pageCoins + metrics.bookCoins + metrics.streakCoins + rewardCoins
      };
    }

    function percent(value, goal) {
      return Math.max(0, Math.min(100, Math.round((value / Math.max(goal, 1)) * 100)));
    }

    function playerLevel(pages) {
      return Math.floor(pages / LEVEL_PAGE_STEP) + 1;
    }

    function levelProgress(pages) {
      return percent(pages % LEVEL_PAGE_STEP, LEVEL_PAGE_STEP);
    }

    function readerTitle(s = state) {
      const level = playerLevel(baseMetrics(s).pages);
      const titles = [
        "Искательница историй",
        "Ловец новых слов",
        "Разведчица страниц",
        "Книжная следопытка",
        "Хранительница полки",
        "Повелительница глав",
        "Звездная читательница",
        "Книжная чемпионка",
        "Хранительница летней библиотеки"
      ];
      const title = titles[Math.min(titles.length - 1, Math.floor((level - 1) / 5))];
      return title;
    }

    function coverUnlocked(color) {
      return colors.includes(color);
    }

    function readingRuns(entries) {
      const days = [...new Set(entries.filter(isApproved).map(entry => entry.date))].sort();
      if (!days.length) return [];

      const runs = [];
      let currentRun = 1;

      for (let index = 1; index < days.length; index += 1) {
        const previous = new Date(days[index - 1] + "T12:00:00");
        previous.setDate(previous.getDate() + 1);

        if (dateKey(previous) === days[index]) {
          currentRun += 1;
        } else {
          runs.push(currentRun);
          currentRun = 1;
        }
      }

      runs.push(currentRun);
      return runs;
    }

    function longestReadingStreak(entries) {
      return Math.max(0, ...readingRuns(entries));
    }

    function streakBonusUnits(entries) {
      return readingRuns(entries).reduce((sum, runLength) => sum + Math.floor(runLength / 7), 0);
    }

    function streakBonusCoins(entries) {
      return streakBonusUnits(entries) * 10;
    }

    function readingStreak(entries) {
      const days = [...new Set(entries.filter(isApproved).map(entry => entry.date))].sort().reverse();
      if (!days.length) return 0;

      let streak = 0;
      const cursor = new Date(today() + "T12:00:00");
      const daySet = new Set(days);

      while (daySet.has(dateKey(cursor))) {
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
      }

      return streak;
    }

    function render() {
      if (syncUnlockedRewards()) saveState();
      const t = totals();
      $("#totalPages").textContent = t.pages;
      $("#totalBooks").textContent = t.books;
      $("#totalCoins").textContent = t.coins;
      $("#streakDays").textContent = readingStreak(state.entries);
      $("#levelText").textContent = playerLevel(t.pages);
      $("#levelFill").style.width = `${levelProgress(t.pages)}%`;
      $("#readerTitle").textContent = readerTitle();

      renderStickers();
      renderShelf();
      renderTimeline();
      renderControls();
    }

      const unlocked = new Set(earnedRewardIds(state));

        const groupRewards = rewards.filter(sticker => sticker.group === group.id);
        const openedCount = groupRewards.filter(sticker => unlocked.has(sticker.id)).length;
        const stickers = groupRewards.map(sticker => {
          const isOpen = unlocked.has(sticker.id);
          const visual = stickerVisual(sticker, stickerIndex, isOpen);
          stickerIndex += 1;
          return `
            <div class="sticker ${isOpen ? "" : "locked"}">
              <span class="sticker-icon">${visual}</span>
              <span class="sticker-label">
                <strong>${escapeHtml(isOpen ? sticker.title : sticker.text)}</strong>
              </span>
            </div>
          `;
        }).join("");

        return `
          <section class="sticker-section">
            <div class="sticker-section-head">
              <h3>${escapeHtml(group.title)}</h3>
              <span>${openedCount} / ${groupRewards.length}</span>
            </div>
            <div class="sticker-grid">${stickers}</div>
          </section>
        `;
      }).join("");
    }

    function renderShelf() {
      const shelf = $("#bookShelf");
      const books = approvedBooks();
      if (!books.length) {
        shelf.innerHTML = `<div class="empty">Здесь будут собираться прочитанные книги</div>`;
        return;
      }

      shelf.innerHTML = books.map(book => `
        <article class="book" style="--book-color: ${book.color}">
          <div class="cover" aria-hidden="true"></div>
          <div class="book-info">
            <p>${starRating(book.rating)}</p>
            <strong>${escapeHtml(book.title)}</strong>
          </div>
        </article>
      `).join("");
    }

    function renderTimeline() {
      const timeline = $("#timeline");
      const records = [
        ...state.entries.map(entry => ({ ...entry, type: "entry", sortAt: entry.createdAt })),
        ...state.books.map(book => ({ ...book, type: "book", sortAt: book.finishedAt + "T12:00:00" }))
      ].sort((a, b) => b.sortAt.localeCompare(a.sortAt));

      if (!records.length) {
        timeline.innerHTML = `<div class="empty">Журнал пока пустой</div>`;
        return;
      }

      timeline.innerHTML = records.map(record => record.type === "book" ? `
        <article class="entry type-book">
          <div class="entry-head">
            <span>${escapeHtml(record.title)}</span>
            <span>${starRating(record.rating)}</span>
          </div>
          ${isApproved(record) ? "" : `<span class="status pending">Ждет печать взрослого</span>`}
          <p>${escapeHtml(record.review)}</p>
          <div class="mini-actions">
            ${isApproved(record) ? "" : `<button class="mini approve" type="button" data-approve-book="${record.id}">Подтвердить</button>`}
          </div>
        </article>
      ` : `
        <article class="entry type-entry">
          <div class="entry-head">
            <span>${escapeHtml(record.title)}</span>
          </div>
          ${isApproved(record) ? "" : `<span class="status pending">Ждет печать взрослого</span>`}
          <p>${escapeHtml(record.learned)}</p>
          <div class="mini-actions">
            ${isApproved(record) ? "" : `<button class="mini approve" type="button" data-approve-entry="${record.id}">Подтвердить</button>`}
          </div>
        </article>
      `).join("");
    }

    function renderControls() {
      if (!coverUnlocked(state.selectedCover)) {
        state.selectedCover = baseColors[0];
        saveState();
      }

      $("#coverOptions").innerHTML = colors.map(color => `
        <button class="swatch ${color === state.selectedCover ? "active" : ""} ${coverUnlocked(color) ? "" : "locked"}" type="button" aria-label="Цвет обложки" data-cover="${color}" style="background: ${color}" ${coverUnlocked(color) ? "" : "disabled"}></button>
      `).join("");

      $("#ratingButtons").innerHTML = Array.from({ length: 5 }, (_, index) => {
        const rating = index + 1;
        return `<button class="star ${rating <= state.selectedRating ? "active" : ""}" type="button" aria-label="${rating}" data-rating="${rating}">${svgStar()}</button>`;
      }).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function adultGate() {
      if (!state.parentPin) {
        const newPin = prompt("Взрослый: придумайте код для подтверждений");
        if (!newPin || newPin.trim().length < 3) {
          alert("Код должен быть не короче 3 символов");
          return false;
        }

        state.parentPin = newPin.trim();
        saveState();
        return true;
      }

      const pin = prompt("Введите код взрослого");
      if (pin !== state.parentPin) {
        alert("Код не подошел");
        return false;
      }

      return true;
    }

    function showMissionNotice(message) {
      const notice = $("#motivation");
      clearTimeout(noticeTimer);
      notice.textContent = message;
      notice.classList.remove("show", "hide");
      requestAnimationFrame(() => notice.classList.add("show"));
      noticeTimer = setTimeout(() => {
        notice.classList.remove("show");
        notice.classList.add("hide");
      }, 2800);
    }

    function exportSummerReport() {
      if (!adultGate()) return;

      const html = buildSummerReport();
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const win = window.open(url, "_blank");

      if (!win) {
        const link = document.createElement("a");
        link.href = url;
        link.download = `chitatelskiy-kvest-adel-${today()}.html`;
        link.click();
      }

      showMissionNotice("Летний итог готов для печати");
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }

    function buildSummerReport() {
      if (syncUnlockedRewards()) saveState();
      const t = totals();
      const books = approvedBooks();
      const entries = approvedEntries();
      const unlocked = rewards.filter(reward => (state.unlockedRewards || []).includes(reward.id));
      const finds = entries
        .slice()
        .sort((a, b) => b.createdAt.localeCompare(a.createdAt));
      const generatedAt = new Intl.DateTimeFormat("ru-RU", { day: "numeric", month: "long", year: "numeric" }).format(new Date());
      const fontRegular = new URL("fonts/Nunito-Regular.ttf", location.href).href;
      const fontBold = new URL("fonts/Nunito-Bold.ttf", location.href).href;

      return `<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Летний читательский итог Адель</title>
  <style>
    @font-face { font-family: Nunito; src: url("${fontRegular}") format("truetype"); font-weight: 400; }
    @font-face { font-family: Nunito; src: url("${fontBold}") format("truetype"); font-weight: 700; }
    @page { size: A4; margin: 14mm; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: #202343;
      background: #f5f7ff;
      font-family: Nunito, system-ui, sans-serif;
    }
    .sheet {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px;
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      border: 1px solid #dfe5ff;
      border-radius: 28px;
    }
    .hero {
      padding: 24px;
      border-radius: 26px;
      color: #fff;
      background: linear-gradient(135deg, #7358dd, #547dea 58%, #63d1ef);
    }
    h1 { margin: 0; font-size: 38px; line-height: 1; }
    .hero p { margin: 10px 0 0; font-size: 18px; opacity: .9; }
    .stats, .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 18px;
    }
    .stat, .card {
      padding: 14px;
      border: 1px solid #dfe5ff;
      border-radius: 20px;
      background: rgba(255,255,255,.9);
    }
    .stat strong { display: block; color: #7358dd; font-size: 28px; line-height: 1; }
    .stat span { display: block; margin-top: 6px; color: #69718f; font-size: 13px; }
    h2 { margin: 28px 0 12px; font-size: 22px; }
    .books { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .book { display: grid; grid-template-columns: 54px 1fr; gap: 12px; align-items: start; }
    .cover { width: 54px; height: 72px; display: grid; place-items: center; border-radius: 14px; background: #d8f3ff; font-size: 26px; }
    .book strong, .card strong { display: block; margin-bottom: 4px; }
    .muted { color: #69718f; }
    .rewards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .reward { min-height: 86px; }
    .medal { font-size: 26px; margin-bottom: 6px; }
    .coin-stack { width: 28px; height: 28px; display: inline-block; vertical-align: middle; }
    .finds { display: grid; gap: 8px; }
    .find { padding: 12px; border-left: 5px solid #bfefff; border-radius: 14px; background: #fff; }
    .coin-note { margin-top: 12px; color: #69718f; font-size: 14px; }
    .footer { margin-top: 26px; color: #69718f; font-size: 13px; text-align: center; }
    .print-button {
      position: fixed;
      right: 18px;
      bottom: 18px;
      padding: 12px 16px;
      border: 0;
      border-radius: 999px;
      color: white;
      background: #7358dd;
      font: inherit;
      font-weight: 700;
      box-shadow: 0 14px 28px rgba(32,35,67,.22);
    }
    @media print {
      body { background: white; }
      .sheet { border: 0; padding: 0; }
      .print-button { display: none; }
    }
  </style>
</head>
<body>
  <main class="sheet">
    <section class="hero">
      <h1>Летний читательский итог Адель</h1>
      <p>Красивый след книжного лета. Сформировано ${escapeHtml(generatedAt)}.</p>
    </section>

    <section class="stats">
      <div class="stat"><strong>${t.pages}</strong><span>страниц</span></div>
      <div class="stat"><strong>${t.books}</strong><span>книг</span></div>
      <div class="stat"><strong>${t.coins}</strong><span>монеток</span></div>
      <div class="stat"><strong>${unlocked.length}</strong><span>наград</span></div>
    </section>
    <div class="coin-note">
      Монеты: ${t.pageCoins} за страницы, ${t.bookCoins} за книги, ${t.rewardCoins} за наклейки, ${t.streakCoins} за серии чтения.
    </div>

    <h2>Прочитанные книги</h2>
    <section class="books">
      ${books.length ? books.map(book => `
        <article class="card book">
          <div class="cover" style="background:${book.color || "#d8f3ff"}">📘</div>
          <div>
            <strong>${escapeHtml(book.title)}</strong>
            <div class="muted">${escapeHtml(book.author || "Автор не указан")}</div>
            <div>${"★".repeat(book.rating)}${"☆".repeat(5 - book.rating)}</div>
            <p class="muted">${escapeHtml(book.review)}</p>
          </div>
        </article>
      `).join("") : `<article class="card muted">Пока нет подтвержденных книг.</article>`}
    </section>

    <h2>Открытые наклейки</h2>
    <section class="rewards">
      ${unlocked.length ? unlocked.map(reward => `
        <article class="card reward">
          <div class="medal">${reward.icon}</div>
          <strong>${escapeHtml(reward.title)}</strong>
          <span class="muted">${escapeHtml(reward.text)} · +5 монет</span>
        </article>
      `).join("") : `<article class="card muted">Наклейки еще впереди.</article>`}
    </section>

    <h2>Что Адель узнала</h2>
    <section class="finds">
      ${finds.length ? finds.map(entry => `
        <article class="find">
          <strong>${escapeHtml(entry.title)} · ${entry.pages} стр.</strong>
          <div class="muted">${escapeHtml(entry.learned)}</div>
        </article>
      `).join("") : `<article class="card muted">Здесь появятся книжные находки.</article>`}
    </section>

    <div class="footer">Читательский квест Адель</div>
  </main>
  <button class="print-button" onclick="window.print()">Печать / PDF</button>
</body>
</html>`;
    }

    function currentRewardIds(s = state) {
      return new Set([...(s.unlockedRewards || []), ...earnedRewardIds(s)]);
    }

    function showApprovalResult(beforeRewardIds, fallbackMessage, bonusMessage = "") {
      const opened = rewards.filter(reward => reward.test(state) && !beforeRewardIds.has(reward.id));
      if (opened.length) {
        showMissionNotice(`Наклейка открыта: ${opened[0].title}! +5 монет${bonusMessage ? `. ${bonusMessage}` : ""}`);
        return;
      }

      showMissionNotice(bonusMessage ? `${fallbackMessage}. ${bonusMessage}` : fallbackMessage);
    }

    function approveEntry(id) {
      if (!adultGate()) return;
      const beforeRewardIds = currentRewardIds();
      const beforeStreakCoins = baseMetrics().streakCoins;
      const entry = state.entries.find(item => item.id === id);
      state.entries = state.entries.map(entry => entry.id === id ? { ...entry, status: "approved" } : entry);
      saveState();
      render();
      switchScreen("map");
      const streakGain = Math.max(0, baseMetrics().streakCoins - beforeStreakCoins);
      const bonusMessage = streakGain ? `Серия чтения: +${streakGain} монет` : "";
      showApprovalResult(beforeRewardIds, `Печать взрослого есть! +${Number(entry?.pages || 0)} монеток`, bonusMessage);
    }

    function approveBook(id) {
      if (!adultGate()) return;
      const beforeRewardIds = currentRewardIds();
      state.books = state.books.map(book => book.id === id ? { ...book, status: "approved" } : book);
      saveState();
      render();
      switchScreen("shelf");
      showApprovalResult(beforeRewardIds, "Книга подтверждена! +25 монеток");
    }

    $("#readingForm").addEventListener("submit", event => {
      event.preventDefault();
      const title = $("#entryTitle").value.trim();
      const pages = Number($("#entryPages").value);
      const learned = $("#entryLearned").value.trim();

      if (!title || !pages || !learned) return;

      state.entries.push({
        id: makeId(),
        date: today(),
        title,
        pages,
        learned,
        status: "pending",
        createdAt: new Date().toISOString()
      });
      saveState();
      render();
      event.target.reset();

      showMissionNotice("Миссия записана! Монетки появятся после печати взрослого");
      switchScreen("journal");
    });

    $("#fillLucky").addEventListener("click", () => {
      const field = $("#entryLearned");
      const phrase = luckyStarts[Math.floor(Math.random() * luckyStarts.length)];
      field.value = field.value || phrase;
      field.focus();
    });

    $("#bookForm").addEventListener("submit", event => {
      event.preventDefault();
      const title = $("#bookTitle").value.trim();
      const author = "Автор не указан";
      const review = $("#bookReview").value.trim();
      if (!title || !review) return;

      state.books.push({
        id: makeId(),
        title,
        author,
        review,
        rating: state.selectedRating,
        color: state.selectedCover,
        status: "pending",
        finishedAt: today()
      });
      saveState();
      render();
      event.target.reset();
      state.selectedRating = 0;
      saveState();
      switchTab("books");
      switchScreen("journal");
      showMissionNotice("Книга записана! 25 монет появятся после печати взрослого");
    });

    document.addEventListener("click", event => {
      const screenTarget = event.target.closest("[data-screen-target]");
      if (screenTarget) switchScreen(screenTarget.dataset.screenTarget);

      const tab = event.target.closest("[data-tab]");
      if (tab) switchTab(tab.dataset.tab);

      const exportReportButton = event.target.closest("[data-export-summer-report]");
      if (exportReportButton) {
        exportSummerReport();
      }

      const cover = event.target.closest("[data-cover]");
      if (cover && !cover.disabled) {
        state.selectedCover = cover.dataset.cover;
        saveState();
        renderControls();
      }

      const rating = event.target.closest("[data-rating]");
      if (rating) {
        state.selectedRating = Number(rating.dataset.rating);
        saveState();
        renderControls();
      }

      const approveEntryButton = event.target.closest("[data-approve-entry]");
      if (approveEntryButton) {
        approveEntry(approveEntryButton.dataset.approveEntry);
      }

      const approveBookButton = event.target.closest("[data-approve-book]");
      if (approveBookButton) {
        approveBook(approveBookButton.dataset.approveBook);
      }

      const deleteBook = event.target.closest("[data-delete-book]");
      if (deleteBook) {
        if (!adultGate()) return;
        state.books = state.books.filter(book => book.id !== deleteBook.dataset.deleteBook);
        saveState();
        render();
      }

      const deleteEntry = event.target.closest("[data-delete-entry]");
      if (deleteEntry) {
        if (!adultGate()) return;
        state.entries = state.entries.filter(entry => entry.id !== deleteEntry.dataset.deleteEntry);
        saveState();
        render();
      }
    });

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.tab === name));
      $("#booksDrawer").classList.toggle("active", name === "books");
      $("#addBookDrawer").classList.toggle("active", name === "addBook");
      if (name === "addBook") {
        state.selectedRating = 0;
        saveState();
        renderControls();
      }
    }

    function switchScreen(name) {
      if (name === "shelf") switchTab("books");

      document.querySelectorAll("[data-screen]").forEach(screen => {
        screen.classList.toggle("active", screen.dataset.screen === name);
      });
      document.querySelectorAll("[data-screen-target]").forEach(button => {
        button.classList.toggle("active", button.dataset.screenTarget === name);
      });
      resetScreenScroll(name);
    }

    function resetScreenScroll(name) {
      window.scrollTo({ top: 0, left: 0, behavior: "auto" });
      const activeScreen = document.querySelector(`[data-screen="${name}"]`);
      activeScreen?.scrollTo?.({ top: 0, left: 0, behavior: "auto" });
      activeScreen?.querySelectorAll(".shelf, .timeline, .panel-body").forEach(element => {
        element.scrollTop = 0;
        element.scrollLeft = 0;
      });
    }

    if ("scrollRestoration" in history) {
      history.scrollRestoration = "manual";
    }

    render();
    switchScreen("mission");

    window.addEventListener("load", () => {
      resetScreenScroll("mission");
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>
</body>
</html>
